name: Ensamblar APK de Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: ☕ Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🩹 Limpiar bloqueos de NPM (Fix EOVERRIDE)
        run: npm pkg delete overrides

      - name: 📦 Instalar dependencias web
        run: npm install --legacy-peer-deps

      - name: 🛠️ Asegurar Motor de Capacitor y Generador de Logos
        run: npm install @capacitor/cli @capacitor/android @capacitor/assets --legacy-peer-deps

      - name: 🏗️ Construir Web (Vite)
        run: npm run build

      - name: 🤖 Sincronizar proyecto con Android
        run: npx cap sync android

      - name: 🎨 Generar Logo e Íconos
        run: npx @capacitor/assets generate --android

      - name: 🩹 Resolver conflicto de Kotlin (Clases duplicadas)
        working-directory: ./android
        run: |
          cat <<EOF >> app/build.gradle
          
          configurations.all {
              resolutionStrategy {
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              }
          }
          EOF

      - name: ⚙️ Otorgar permisos al motor de Android
        working-directory: ./android
        run: chmod +x ./gradlew

      - name: 🚀 Empaquetar APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: 🎁 Guardar y entregar APK final
        uses: actions/upload-artifact@v4
        with:
          name: campus-virtual-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk