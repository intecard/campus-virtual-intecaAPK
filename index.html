<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Virtual INTECA</title>
  </head>
  <body>
    <script>
      // Atrapa errores de codigo y carga
      window.addEventListener('error', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'color: white; background: red; padding: 20px; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; font-size: 14px; font-family: monospace; word-wrap: break-word; overflow-y: auto;';
        errorDiv.innerHTML = '🕵️ ERROR DETECTADO:<br><br>' + event.message + '<br><br>Archivo: ' + event.filename + '<br>Línea: ' + event.lineno;
        document.body.appendChild(errorDiv);
      });

      // Atrapa errores asincronos (como bases de datos o promesas)
      window.addEventListener('unhandledrejection', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'color: white; background: darkred; padding: 20px; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; font-size: 14px; font-family: monospace; word-wrap: break-word; overflow-y: auto;';
        errorDiv.innerHTML = '🕵️ PROMESA RECHAZADA:<br><br>' + (event.reason ? event.reason.toString() : 'Error asíncrono desconocido');
        document.body.appendChild(errorDiv);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
